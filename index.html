<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildin FC | Resmi Web Sitesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           GENEL VE MODERN TASARIM AYARLARI
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #0d0d11; /* Modern Gece Siyahı */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ==========================================
           NAVIGASYON (NAVBAR) & LOGO AYARLARI
           ========================================== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13, 13, 17, 0.85);
            backdrop-filter: blur(10px); /* Arkadaki içeriği bulanıklaştıran modern efekt */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            padding: 15px 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        /* LOGONUN EKRANDA DÜZGÜN GÖRÜNMESİNİ SAĞLAYAN KISIM */
        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 12px;
        }

        .site-logo {
            height: 50px; /* Logonun ekrandaki yüksekliği */
            width: auto;  /* En-boy oranını korur, logoyu ezmez */
            object-fit: contain;
            /* Logonun arkasında hafif neon bir parlama efekti yaratır */
            filter: drop-shadow(0px 0px 8px rgba(255, 51, 102, 0.3)); 
        }

        .logo-text {
            color: #fff;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .accent {
            color: #ff3366; /* Takımımızın vurgu rengi (Neon Pembe/Kırmızı) */
        }

        /* Menü Linkleri */
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-menu a {
            color: #a0a0aa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-menu a:hover {
            color: #fff;
        }

        /* ==========================================
           HERO (GİRİŞ) ALANI TASARIMI
           ========================================== */
        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 10%;
            /* Modern, teknolojik bir arka plan ışığı efekti */
            background: radial-gradient(circle at 80% 20%, rgba(255, 51, 102, 0.15) 0%, transparent 50%), 
                        radial-gradient(circle at 20% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 50%);
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-title {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        /* Başlıktaki renk geçişli (Gradient) yazı */
        .gradient-text {
            background: linear-gradient(45deg, #ff3366, #ff6633);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #a0a0aa;
            max-width: 550px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Çağrı Butonu (CTA) */
        .cta-btn {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(45deg, #ff3366, #ff6633);
            color: white;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(255, 51, 102, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 51, 102, 0.5);
        }

        /* Mobil Uyum (Responsive) */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 3rem;
            }
            .nav-menu {
                display: none; /* Mobil menü tasarımı daha sonra eklenebilir */
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo-link">
                <img src="logo.png" alt="Bildin FC Logo" class="site-logo">
                <span class="logo-text">BİLDİN <span class="accent">FC</span></span>
            </a>
            <ul class="nav-menu">
                <li><a href="#home">Ana Sayfa</a></li>
                <li><a href="#team">Takımımız</a></li>
                <li><a href="#matches">Maçlar</a></li>
                <li><a href="#contact">İletişim</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero-section" id="home">
        <div class="hero-content">
            <h1 class="hero-title">SAHANIN <br><span class="gradient-text">YENİ KRALLARI</span></h1>
            <p class="hero-subtitle">Bildin FC ruhuyla tanışın. Sahada basmadık yer bırakmayanların, son düdüğe kadar pes etmeyenlerin takımı.</p>
            <a href="#matches" class="cta-btn">Son Maçları Gör</a>
        </div>
    </header>

</body>
</html>
