<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildin FC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           GENEL AYARLAR
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #030712;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 140px; /* Navbar için boşluk */
        }

        /* ==========================================
           TAM ORTALANMIŞ PARLAYAN NAVBAR
           ========================================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 102, 255, 0.2);
            z-index: 1000;
            padding: 20px 0;
            display: flex;
            justify-content: center; /* İçeriği tam ortalar */
            align-items: center;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 15px;
        }

        .site-logo {
            height: 60px;
            width: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0066ff;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.6);
        }

        .logo-text {
            color: #ffffff;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .accent {
            color: #0066ff;
            text-shadow: 0 0 15px rgba(0, 102, 255, 0.8);
        }

        /* ==========================================
           OYUNCU KARTLARI ALANI
           ========================================== */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
            margin-bottom: 80px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 35px;
            padding: 20px 0;
        }

        /* RGB Parlayan ve Büyüyen Kartlar */
        .card {
            background: #0b1329;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        /* Kartın arkasındaki gizli RGB dönme efekti */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(#ff0000, #ff7700, #ffea00, #00ff00, #00ffff, #0022ff, #7500ff, #ff00c8, #ff0000);
            animation: spin 4s linear infinite;
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 1;
        }

        /* Kartın iç siyah gövdesi (RGB çizgi gibi görünsün diye) */
        .card-inner {
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            background: #0b1329;
            border-radius: 17px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background 0.4s;
        }

        /* TIKLANDIĞINDA VEYA ÜSTÜNE GELİNDİĞİNDE BÜYÜME VE RGB AKTİFLEŞME */
        .card:hover, .card:focus, .card.active {
            transform: scale(1.12); /* Kartı büyütür */
            z-index: 10;
            box-shadow: 0 0 35px rgba(0, 102, 255, 0.5);
        }

        .card:hover::before, .card:focus::before, .card.active::before {
            opacity: 1; /* RGB ışıkları yakar */
        }

        .card:hover .card-inner, .card:focus .card-inner, .card.active .card-inner {
            background: #111a36; /* İç rengi biraz açar */
        }

        /* Kart İçeriği Yazı Tasarımları */
        .player-number {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            transition: color 0.3s;
        }

        .card:hover .player-number, .card.active .player-number {
            color: #0066ff;
            text-shadow: 0 0 15px rgba(0, 102, 255, 0.6);
        }

        .player-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* RGB Animasyonu Dönüş Hızı */
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo-link">
            <img src="https://instagram.fyei6-3.fna.fbcdn.net/v/t51.82787-19/684860698_17915959620365646_8987748871476407852_n.jpg?stp=dst-jpg_s320x320_tt6&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby4xMDgwLmMyIn0&_nc_ht=instagram.fyei6-3.fna.fbcdn.net&_nc_cat=106&_nc_oc=Q6cZ2gE1u3f_WSex_NC80tiOYiDWATJ463rjkUZs315nBsxWskkjx0RFOnUzb8d9kZapRcg&_nc_ohc=K24xuEEnn3QQ7kNvwFTnz6H&_nc_gid=-XF2wGtbv8N5gLUKruH_Aw&edm=AOQ1c0wBAAAA&ccb=7-5&oh=00_Af9-w8RKkqgHQEiQKIqqbdvjDIEsTLPpHNadNmm78hPZzw&oe=6A2F5A80&_nc_sid=8b3546" alt="Bildin FC Logo" class="site-logo">
            <span class="logo-text">BİLDİN <span class="accent">FC</span></span>
        </a>
    </nav>

    <main class="container">
        <div class="grid-container">
            
            <div class="card" tabindex="0">
                <div class="card-inner">
                    <div class="player-number">01</div>
                    <div class="player-name">İshakso</div>
                </div>
            </div>

            <div class="card" tabindex="0">
                <div class="card-inner">
                    <div class="player-number">03</div>
                    <div class="player-name">Emin</div>
                </div>
            </div>

            <div class="card" tabindex="0">
                <div class="card-inner">
                    <div class="player-number">05</div>
                    <div class="player-name">Emirhan</div>
                </div>
            </div>

            <div class="card" tabindex="0">
                <div class="card-inner">
                    <div class="player-number">09</div>
                    <div class="player-name">Eray</div>
                </div>
            </div>

            <div class="card" tabindex="0">
                <div class="card-inner">
                    <div class="player-number">10</div>
                    <div class="player-name">İhsan</div>
                </div>
            </div>

            <div class="card" tabindex="0">
                <div class="card-inner">
                    <div class="player-number">22</div>
                    <div class="player-name">Altay</div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
            });
        });
    </script>

</body>
</html>
