<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildin FC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           GENEL AYARLAR & SİBER ARKA PLAN
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #02050a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 180px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 102, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 255, 0.08) 0%, transparent 40%),
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
        }

        /* ==========================================
           MODERN MENÜLÜ ÜST ALAN (NAVBAR)
           ========================================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(2, 5, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 102, 255, 0.3);
            z-index: 1000;
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.1);
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 15px;
        }

        .site-logo-shield {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066ff, #00ffcc);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 18px;
            color: #ffffff;
            border: 2px solid #ffffff;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.6);
        }

        .logo-text {
            color: #ffffff;
            font-weight: 900;
            font-size: 26px;
            letter-spacing: 2px;
        }

        .accent {
            color: #0066ff;
            text-shadow: 0 0 20px rgba(0, 102, 255, 1);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 24px;
            border-radius: 30px;
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.4);
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #0066ff;
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.6);
            border-color: #00ffcc;
        }

        /* ==========================================
           BÖLÜM BAŞLIKLARI VE YAPISI
           ========================================== */
        .section-title {
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #0066ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 102, 255, 0.3));
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 60px 20px;
        }

        /* ==========================================
           DEVAASA OYUNCU KARTLARI (RGB GÜNCELLEME)
           ========================================== */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            padding: 10px 0;
        }

        .card {
            background: #060d1f;
            border-radius: 24px;
            height: 320px;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            overflow: hidden;
            border: 2px solid rgba(0, 102, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.15);
        }

        /* RGB Efekti */
        .card::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: conic-gradient(#0066ff, #ff00ff, #00ffcc, #0022ff, #ff0055, #0066ff);
            animation: spin 4s linear infinite;
            opacity: 0.3; /* Normalde hafif parlasın */
            transition: opacity 0.4s;
            z-index: 1;
        }

        .card-inner {
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            background: #060c1a;
            border-radius: 20px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background 0.4s;
            padding: 20px;
        }

        /* AKTİFLEŞME VE RGB COŞMASI */
        .card.active {
            transform: scale(1.12);
            z-index: 10;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.6), 0 0 70px rgba(0, 102, 255, 0.4);
            border-color: transparent;
        }

        .card.active::before {
            opacity: 1; /* Tıklanınca RGB tamamen belirginleşir */
            animation: spin 2s linear infinite; /* Tıklanınca daha hızlı döner */
        }

        .card.active .card-inner {
            background: linear-gradient(135deg, #09132a 0%, #030814 100%);
        }

        .player-number {
            font-size: 5.5rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #ffffff 30%, rgba(255,255,255,0.05) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.3s;
        }

        .card.active .player-number {
            background: linear-gradient(180deg, #00ffcc 0%, #0066ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 102, 255, 0.6));
        }

        .player-name {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .player-badge {
            font-size: 0.8rem;
            color: #00ffcc;
            border: 1px solid rgba(0, 255, 204, 0.3);
            background: rgba(0, 255, 204, 0.05);
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* ==========================================
           FORMAMIZ BÖLÜMÜ TASARIMI (RGB GÜNCELLEME)
           ========================================== */
        .kit-wrapper {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto;
        }

        .kit-box {
            background: #060d1f;
            border: 2px solid rgba(0, 102, 255, 0.2);
            border-radius: 24px;
            padding: 4px; /* RGB çerçeve boşluğu */
            text-align: center;
            flex: 1;
            min-width: 340px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.15);
        }

        /* Forma kutusu RGB Efekti */
        .kit-box::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: conic-gradient(#0066ff, #ff00ff, #00ffcc, #0022ff, #ff0055, #0066ff);
            animation: spin 4s linear infinite;
            opacity: 0.3; /* Normalde hafif parlasın */
            transition: opacity 0.4s;
            z-index: 1;
        }

        .kit-box-inner {
            position: relative;
            background: #060c1a;
            border-radius: 20px;
            padding: 25px;
            z-index: 2;
            transition: background 0.4s;
        }

        /* FORMA TIKLANDIĞINDA BÜYÜME VE RGB COŞMASI */
        .kit-box.active {
            transform: scale(1.12);
            z-index: 10;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.6), 0 0 70px rgba(0, 102, 255, 0.4);
            border-color: transparent;
        }

        .kit-box.active::before {
            opacity: 1;
            animation: spin 2s linear infinite;
        }

        .kit-box.active .kit-box-inner {
            background: linear-gradient(135deg, #09132a 0%, #030814 100%);
        }

        .kit-display {
            width: 100%;
            height: 380px;
            background: radial-gradient(circle, rgba(0,102,255,0.2) 0%, transparent 70%);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed rgba(0, 102, 255, 0.3);
            margin-bottom: 15px;
            overflow: hidden;
        }

        .kit-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: drop-shadow(0 0 15px rgba(0, 102, 255, 0.3));
            transition: filter 0.3s;
        }

        .kit-box.active .kit-img {
            filter: drop-shadow(0 0 25px rgba(0, 255, 204, 0.6));
        }

        .kit-text {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* ==========================================
           SOSYAL MEDYA ALANI
           ========================================== */
        .footer-social {
            margin: 40px 0 60px 0;
            text-align: center;
            width: 100%;
        }

        .social-title {
            font-size: 1.1rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .social-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 102, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.1);
        }

        .social-btn:hover {
            transform: translateY(-3px);
            background: #0066ff;
            border-color: #00ffcc;
            box-shadow: 0 0 25px rgba(0, 102, 255, 0.6);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .navbar { padding: 10px 0; gap: 10px;}
            .logo-text { font-size: 20px; }
            .grid-container { grid-template-columns: 1fr; }
            .card { height: 280px; }
            .player-name { font-size: 1.6rem; }
            .kit-wrapper { gap: 20px; }
            .kit-box { min-width: 100%; }
            .kit-display { height: 300px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo-link">
            <div class="site-logo-shield">BFC</div>
            <span class="logo-text">BİLDİN <span class="accent">FC</span></span>
        </a>
        <div class="nav-links">
            <a href="#kadro" class="nav-btn">Kadromuz</a>
            <a href="#forma" class="nav-btn">Formamız</a>
        </div>
    </nav>

    <main class="container" id="kadro">
        <h2 class="section-title">KADROMUZ</h2>
        <div class="grid-container">
            
            <div class="card">
                <div class="card-inner">
                    <div class="player-number">01</div>
                    <div class="player-name">İshakso</div>
                    <div class="player-badge">Kadro</div>
                </div>
            </div>

            <div class="card">
                <div class="card-inner">
                    <div class="player-number">03</div>
                    <div class="player-name">Emin</div>
                    <div class="player-badge">Kadro</div>
                </div>
            </div>

            <div class="card">
                <div class="card-inner">
                    <div class="player-number">05</div>
                    <div class="player-name">Emirhan</div>
                    <div class="player-badge">Kadro</div>
                </div>
            </div>

            <div class="card">
                <div class="card-inner">
                    <div class="player-number">09</div>
                    <div class="player-name">Eray</div>
                    <div class="player-badge">Kadro</div>
                </div>
            </div>

            <div class="card">
                <div class="card-inner">
                    <div class="player-number">10</div>
                    <div class="player-name">İhsan</div>
                    <div class="player-badge">Kadro</div>
                </div>
            </div>

            <div class="card">
                <div class="card-inner">
                    <div class="player-number">22</div>
                    <div class="player-name">Altay</div>
                    <div class="player-badge">Kadro</div>
                </div>
            </div>

        </div>
    </main>

    <section class="container" id="forma">
        <h2 class="section-title">FORMAMIZ</h2>
        <div class="kit-wrapper">
            
            <div class="kit-box">
                <div class="kit-box-inner">
                    <div class="kit-display">
                        <img src="https://i.hizliresim.com/2gg7fvo.jpg" alt="Bildin FC Forma Ön" class="kit-img">
                    </div>
                    <div class="kit-text">ZIRH <span class="accent">ÖN SUİT</span></div>
                </div>
            </div>

            <div class="kit-box">
                <div class="kit-box-inner">
                    <div class="kit-display">
                        <img src="https://i.hizliresim.com/77oy5vb.jpg" alt="Bildin FC Forma Arka" class="kit-img">
                    </div>
                    <div class="kit-text">ZIRH <span class="accent">ARKA SUİT</span></div>
                </div>
            </div>

        </div>
    </section>

    <footer class="footer-social">
        <div class="social-title">Bizi Takip Edin</div>
        <div class="social-grid">
            <a href="https://www.instagram.com" target="_blank" class="social-btn">Instagram</a>
            <a href="https://www.tiktok.com" target="_blank" class="social-btn">TikTok</a>
            <a href="https://www.youtube.com" target="_blank" class="social-btn">YouTube</a>
        </div>
    </footer>

    <script>
        const elementsToClick = document.querySelectorAll('.card, .kit-box');
        
        elementsToClick.forEach(element => {
            element.addEventListener('click', () => {
                if(element.classList.contains('active')) {
                    element.classList.remove('active');
                } else {
                    elementsToClick.forEach(el => el.classList.remove('active'));
                    element.classList.add('active');
                }
            });
        });
    </script>

</body>
        </html>
